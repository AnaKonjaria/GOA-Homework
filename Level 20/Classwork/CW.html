<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h1>My feedback form</h1>
<ul>
<form>
    <li><label for="name">Name:</label>
    <input type="text" id="name"></li>
    <li><label for="email">Email:</label>
    <input type="text" id="email"></li>
    <li><label for="pass">Password:</label>
    <input type="text" id="pass"></li>
    <br>
    <li><label>Please check all the emotiions that apply to you:</label></li>
        <ul>
            <li>
                <label for="id1">Angry</label>
                <input type="checkbox" id="id1">
            </li>
            <li>
                <label for="id2">Sad</label>
                <input type="checkbox" id="id2">
            </li>
            <li>
                <label for="id3">Happy</label>
                <input type="checkbox" id="id3">
            </li>
            <li>
                <label for="id4">Ambivalent</label>
                <input type="checkbox" id="id4">
            </li>
        </ul>
    <li><label>How satisfied were you with our service?</label></li>
        <ul>
            <li>
                <label for="id1">Very Satisfied</label>
                <input type="radio" id="id1">
            </li>
            <li>
                <label for="id1">Satisfied</label>
                <input type="radio" id="id1">
            </li>
            <li>
                <label for="id1">Didn't care</label>
                <input type="radio" id="id1">
            </li>
            <li>
                <label for="id1">Dissatisfied</label>
                <input type="radio" id="id1">
            </li>
            <li>
                <label for="id1">Very dissatisfied</label>
                <input type="radio" id="id1">
            </li>

        </ul>
    <li>
        <label for="comment">Further comments:</label>
        <input type="text" id="comment">
    </li>
    <li>
        <label for="photo">Bio photo:</label>
        <input type="file" id="photo">
    </li>
    <li>
        <label for="location">Location visited:</label>
        <select id="location">
            <option>1</option>
            <option>2</option>
    </li>
    <br>
    <li>
        <input type="submit">
    </li>

</form>


</ul>


</body>
</html>
